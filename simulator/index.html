<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nodus — Virtual Pet Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }
    h1 { font-size: 1.2rem; opacity: 0.6; }
    #nodus {
      width: 240px;
      height: 240px;
      background: #0f0f23;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(100, 200, 255, 0.15);
      transition: box-shadow 0.5s;
    }
    #face {
      font-size: 4rem;
      transition: opacity 0.3s;
      user-select: none;
    }
    #mood {
      font-size: 1rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    #controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #16213e;
      color: #eee;
      border: 1px solid #333;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }
    button:hover { background: #1a3a5c; }
    button.active { border-color: #64c8ff; color: #64c8ff; }
    #log {
      width: 300px;
      height: 120px;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.5rem;
      font-size: 0.7rem;
      overflow-y: auto;
      opacity: 0.7;
    }
    .glow-happy { box-shadow: 0 0 40px rgba(100, 255, 150, 0.3); }
    .glow-sleepy { box-shadow: 0 0 40px rgba(150, 150, 255, 0.2); }
    .glow-thinking { box-shadow: 0 0 40px rgba(255, 200, 100, 0.25); }
    .glow-sad { box-shadow: 0 0 40px rgba(100, 100, 255, 0.3); }
    .glow-alert { box-shadow: 0 0 40px rgba(255, 100, 100, 0.35); }
  </style>
</head>
<body>
  <h1>N O D U S</h1>
  <div id="nodus">
    <span id="face"></span>
  </div>
  <div id="mood"></div>
  <div id="controls"></div>
  <div id="log"></div>

  <script>
    const moods = [
      { name: 'happy',    face: '(^^)',  glow: 'glow-happy' },
      { name: 'sleepy',   face: '(--)',  glow: 'glow-sleepy' },
      { name: 'thinking', face: '(••?)', glow: 'glow-thinking' },
      { name: 'sad',      face: '(T_T)', glow: 'glow-sad' },
      { name: 'alert',    face: '(><)',  glow: 'glow-alert' },
    ];

    let current = 0;
    let autoMode = true;
    let timer = null;

    const $face = document.getElementById('face');
    const $mood = document.getElementById('mood');
    const $nodus = document.getElementById('nodus');
    const $controls = document.getElementById('controls');
    const $log = document.getElementById('log');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = `> ${msg}`;
      $log.appendChild(line);
      $log.scrollTop = $log.scrollHeight;
    }

    function setMood(index) {
      current = index;
      const m = moods[current];
      $face.textContent = m.face;
      $mood.textContent = m.name;
      $nodus.className = m.glow;
      document.querySelectorAll('#controls button[data-mood]').forEach((b, i) => {
        b.classList.toggle('active', i === current);
      });
      log(`Mood: ${m.name.toUpperCase()}  ${m.face}`);
    }

    function next() {
      setMood((current + 1) % moods.length);
    }

    function startAuto() {
      autoMode = true;
      timer = setInterval(next, 3000);
      log('Auto mode ON');
    }

    function stopAuto() {
      autoMode = false;
      clearInterval(timer);
      log('Auto mode OFF');
    }

    // Blink animation
    setInterval(() => {
      const original = $face.textContent;
      $face.textContent = '(——)';
      setTimeout(() => { $face.textContent = original; }, 150);
    }, 4000 + Math.random() * 3000);

    // Build buttons
    moods.forEach((m, i) => {
      const btn = document.createElement('button');
      btn.textContent = `${m.face} ${m.name}`;
      btn.dataset.mood = i;
      btn.onclick = () => { stopAuto(); setMood(i); };
      $controls.appendChild(btn);
    });

    const autoBtn = document.createElement('button');
    autoBtn.textContent = '▶ Auto';
    autoBtn.onclick = () => { autoMode ? stopAuto() : startAuto(); };
    $controls.appendChild(autoBtn);

    // Init
    log('Nodus starting...');
    setMood(0);
    startAuto();
  </script>
</body>
</html>
